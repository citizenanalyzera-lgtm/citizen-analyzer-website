// Color utils
const severityColor = (s) => s === "high" ? "#ef4444" : s === "medium" ? "#f59e0b" : "#22c55e";
const impactColor = (s) => s > 1 ? "#22c55e" : s < -1 ? "#ef4444" : s === 0 ? "#94a3b8" : s > 0 ? "#86efac" : "#fca5a5";
const verdictColor = (v) => v === "Faux" ? "#ef4444" : v === "Trompeur" ? "#f59e0b" : v.includes("Partiel") ? "#3b82f6" : "#22c55e";

function ScoreBar({ value, max = 100, color = "#6366f1", label }) {
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 3, color: "#c4c9d4" }}>
        <span>{label}</span><span style={{ color }}>{value}/{max}</span>
      </div>
      <div style={{ height: 6, background: "#1e2a3a", borderRadius: 3 }}>
        <div style={{ height: "100%", width: `${(value / max) * 100}%`, background: color, borderRadius: 3, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function ExplorerPage({ setPage, setSelectedAnalysis }) {
  const [country, setCountry] = useState("all");
  const [type, setType] = useState("all");
  const filtered = mockAnalyses.filter(a =>
    (country === "all" || a.country === country) &&
    (type === "all" || a.type === type)
  );
  const Select = ({ value, onChange, options }) => (
    <select value={value} onChange={e => onChange(e.target.value)} style={{
      padding: "8px 12px", borderRadius: 6, border: "1px solid #1e2d3d", background: "#0f1a2e",
      color: "#c4c9d4", fontSize: 13, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
    }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 24px" }}>
      <h1 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 28, fontWeight: 800, color: "#f1f5f9", marginBottom: 8 }}>Explorer les analyses</h1>
      <p style={{ color: "#94a3b8", fontSize: 14, marginBottom: 24 }}>Naviguez dans les analyses publiées par la communauté</p>
      <div style={{ display: "flex", gap: 12, marginBottom: 32 }}>
        <Select value={country} onChange={setCountry} options={[
          { value: "all", label: "🌍 Tous les pays" },
          { value: "FR", label: "🇫🇷 France" },
          { value: "DE", label: "🇩🇪 Allemagne" },
        ]} />
        <Select value={type} onChange={setType} options={[
          { value: "all", label: "📋 Tous les types" },
          { value: "Programme", label: "📄 Programme" },
          { value: "Discours", label: "🎤 Discours" },
        ]} />

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map(a => (
          <div key={a.id} onClick={() => { setSelectedAnalysis(a); setPage(PAGES.ANALYSIS); }} style={{
            background: "#0f1a2e", border: "1px solid #1e2d3d", borderRadius: 10, padding: 20,
            cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", transition: "all 0.2s",

                <span style={{ padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600, background: "rgba(34,197,94,0.1)", color: "#4ade80" }}>{a.type}</span>
                <span style={{ padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600, background: "rgba(245,158,11,0.1)", color: "#fbbf24" }}>Super JSON v{a.version}</span>
              </div>
              <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 600, color: "#e2e8f0", margin: "0 0 4px" }}>{a.name}</h3>
              <div style={{ fontSize: 12, color: "#64748b" }}>{a.group} → {a.party}{a.person ? ` → ${a.person}` : ""} · {a.date}</div>

function QuizPlayPage({ setPage }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const q = quizQuestions[current];
  const handleAnswer = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i === q.correct) setScore(s => s + 1);
  };
  const next = () => {
    if (current < quizQuestions.length - 1) { setCurrent(c => c + 1); setSelected(null); setAnswered(false); }
    else setFinished(true);
  };
  if (finished) return (
    <div style={{ maxWidth: 600, margin: "0 auto", padding: "60px 24px", textAlign: "center" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🎯</div>
      <h2 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 24, fontWeight: 800, color: "#f1f5f9", marginBottom: 8 }}>Quiz terminé !</h2>
      <p style={{ fontSize: 32, fontWeight: 800, color: "#818cf8", fontFamily: "'DM Sans', sans-serif" }}>{score}/{quizQuestions.length}</p>
      <p style={{ color: "#94a3b8", fontSize: 14, margin: "8px 0 24px" }}>{score === quizQuestions.length ? "Parfait ! Vous avez l'œil !" : "Continuez à apprendre, vous progressez !"}</p>
      <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
        <button onClick={() => setPage(PAGES.QUIZ)} style={{ padding: "10px 20px", borderRadius: 6, border: "1px solid #2d3748", background: "transparent", color: "#c4c9d4", cursor: "pointer", fontWeight: 600 }}>Autres quiz</button>
        <button onClick={() => setPage(PAGES.LEARN)} style={{ padding: "10px 20px", borderRadius: 6, border: "none", background: "linear-gradient(135deg, #6366f1, #8b5cf6)", color: "#fff", cursor: "pointer", fontWeight: 600 }}>Continuer à apprendre</button>
      </div>
    </div>
  );
  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "40px 24px" }}>
      <button onClick={() => setPage(PAGES.QUIZ)} style={{ background: "none", border: "none", color: "#818cf8", cursor: "pointer", fontSize: 13, marginBottom: 20, padding: 0 }}>← Retour</button>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span style={{ fontSize: 12, color: "#64748b" }}>Question {current + 1}/{quizQuestions.length}</span>
        <span style={{ fontSize: 12, color: "#818cf8", fontWeight: 600 }}>Score : {score}</span>
      </div>
      <div style={{ background: "#0f1a2e", border: "1px solid #1e2d3d", borderRadius: 12, padding: 28 }}>
        <h2 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, fontWeight: 600, color: "#f1f5f9", marginBottom: 20, lineHeight: 1.5 }}>{q.q}</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {q.options.map((o, i) => (
            <button key={i} onClick={() => handleAnswer(i)} style={{
              padding: "12px 16px", borderRadius: 8, textAlign: "left", cursor: answered ? "default" : "pointer",
              fontSize: 14, color: "#e2e8f0", fontFamily: "'DM Sans', sans-serif", transition: "all 0.2s",
              border: `1px solid ${answered ? (i === q.correct ? "#22c55e" : i === selected ? "#ef4444" : "#1e2d3d") : selected === i ? "#6366f1" : "#1e2d3d"}`,
              background: answered ? (i === q.correct ? "rgba(34,197,94,0.1)" : i === selected ? "rgba(239,68,68,0.1)" : "#0a1020") : "#0a1020",
            }}>{o}</button>
          ))}
        </div>
        {answered && (
          <div style={{ marginTop: 16, padding: 16, background: "#1a2536", borderRadius: 8, borderLeft: "3px solid #6366f1" }}>
            <div style={{ fontSize: 13, color: "#c4c9d4", lineHeight: 1.5 }}>{q.explanation}</div>
          </div>
        )}
        {answered && (
          <button onClick={next} style={{
            marginTop: 16, padding: "10px 24px", borderRadius: 6, border: "none",
            background: "linear-gradient(135deg, #6366f1, #8b5cf6)", color: "#fff",
            fontWeight: 600, cursor: "pointer", fontSize: 13, width: "100%",
          }}>{current < quizQuestions.length - 1 ? "Question suivante →" : "Voir le résultat"}</button>
        )}
      </div>
    </div>
  );
}

        </div>

          <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: "#818cf8", margin: "0 0 16px" }}>📈 Activité de la communauté</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
            {[
              { label: "Analyses ce mois", value: "23", trend: "+15%" },
              { label: "Nouveaux contributeurs", value: "8", trend: "+33%" },
              { label: "Quiz complétés", value: "142", trend: "+22%" },
              { label: "Super JSON créés", value: "3", trend: "Nouveau" },
            ].map((s, i) => (
              <div key={i} style={{ textAlign: "center", padding: 12, background: "#1a2536", borderRadius: 8 }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", fontFamily: "'DM Sans', sans-serif" }}>{s.value}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
                <div style={{ fontSize: 10, color: "#4ade80", marginTop: 4 }}>{s.trend}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function InstitutionalPage({ title, icon, sections, setPage }) {
  return (
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "40px 24px" }}>
      <h1 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 28, fontWeight: 800, color: "#f1f5f9", marginBottom: 32 }}>{icon} {title}</h1>
      {sections.map((s, i) => (
        <div key={i} style={{ marginBottom: 24 }}>
          <div style={{ background: "#0f1a2e", border: "1px solid #1e2d3d", borderRadius: 10, padding: 24 }}>
            <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 700, color: "#818cf8", margin: "0 0 12px" }}>{s.title}</h3>
            <div style={{ color: "#c4c9d4", fontSize: 14, lineHeight: 1.7 }}>{s.content}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [page, setPage] = useState(PAGES.HOME);
  const [selectedAnalysis, setSelectedAnalysis] = useState(null);
  const [selectedModule, setSelectedModule] = useState(modules[0]);

  const methodSections = [
    { title: "Fondements académiques", content: "L'analyse distributionnelle s'appuie sur les méthodologies de l'OCDE et de la Banque Mondiale. Les grilles de détection rhétorique sont issues de la recherche en sciences du langage et en communication politique. Le scoring de régime utilise des indicateurs reconnus dans la littérature académique en science politique." },
    { title: "Pipeline d'analyse", content: "Chaque contenu est analysé par un LLM (Large Language Model) à travers plusieurs modules spécialisés. Le LLM identifie les mécanismes rhétoriques, évalue les tendances de régime, mesure l'impact distributionnel et vérifie les affirmations factuelles. Plusieurs passes sont nécessaires car une seule analyse ne détecte jamais l'ensemble des éléments." },
    { title: "Processus de consolidation", content: "Les analyses individuelles sont fusionnées en 'Super JSON' qui combinent les détections de multiples contributeurs. Les contradictions sont résolues par consensus (majorité des détections) et par review humaine. Ce processus produit des analyses plus complètes et fiables qu'aucune contribution individuelle." },
    { title: "Neutralité politique", content: "Les mêmes grilles d'analyse sont appliquées à tous les bords politiques sans exception. Aucune pondération idéologique n'est intégrée dans les prompts ou les critères d'évaluation. La transparence totale de la méthode permet à chacun de vérifier l'absence de biais systémique." },
  ];

  const limitSections = [
    { title: "Limites du LLM", content: "Les hallucinations restent possibles malgré les garde-fous. La sensibilité au contexte culturel et linguistique peut produire des interprétations variables. Les résultats peuvent différer entre les passes d'analyse, d'où l'importance du crowdsourcing pour consolider les détections." },
    { title: "Limites de la détection rhétorique", content: "L'ironie, le second degré et les références culturelles implicites échappent souvent à l'analyse automatique. Le contexte non-verbal (ton, gestuelle, expressions faciales) est absent de l'analyse textuelle. Des faux positifs et faux négatifs sont inévitables." },
    { title: "Limites du scoring", content: "Un score n'est pas un verdict politique. Les grilles sont des outils de lecture, pas des jugements absolus. Les seuils sont conventionnels et la comparabilité entre contextes très différents (pays, époques) reste limitée." },
    { title: "Ce que l'outil n'est pas", content: "Citizen Analyzer n'est pas un juge politique, pas un substitut à l'esprit critique personnel, pas une source primaire d'information, et pas un outil infaillible. C'est un instrument d'aide à la compréhension du discours politique, à utiliser en complément de sa propre réflexion." },
  ];

  const aboutSections = [
    { title: "La mission", content: "Citizen Analyzer existe pour rendre l'analyse politique accessible à tous. Le discours politique utilise des techniques de persuasion que la plupart des citoyens ne sont pas formés à identifier. Notre outil comble ce déficit en offrant une analyse automatisée, transparente et collaborative." },
    { title: "Positionnement", content: "Non-partisan : nous analysons tous les bords politiques avec les mêmes grilles. Indépendant : aucun financement politique, aucune affiliation partisane. Transparent : la méthode, le code, les limites — tout est public et documenté." },
    { title: "Modèle", content: "Projet open source et collaboratif. Pas de publicité, pas de revente de données. Le financement repose sur les contributions volontaires et le bénévolat. L'objectif est de rester un bien commun citoyen." },
    { title: "Contribuer", content: "Utilisez l'extension pour analyser des contenus politiques et partagez vos analyses. Chaque contribution enrichit la base commune et aide d'autres citoyens à mieux comprendre le discours politique. Vous pouvez aussi contribuer au code, aux contenus éducatifs, ou aux quiz." },
  ];

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(180deg, #080d19 0%, #0c1222 100%)",
      color: "#c4c9d4",
      fontFamily: "'DM Sans', -apple-system, sans-serif",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <Nav page={page} setPage={setPage} />
      {page === PAGES.HOME && <HomePage setPage={setPage} setSelectedAnalysis={setSelectedAnalysis} />}
      {page === PAGES.EXPLORER && <ExplorerPage setPage={setPage} setSelectedAnalysis={setSelectedAnalysis} />}
      {page === PAGES.ANALYSIS && <AnalysisPage analysis={selectedAnalysis} setPage={setPage} />}
      {page === PAGES.LEARN && <LearnPage setPage={setPage} setSelectedModule={setSelectedModule} />}
      {page === PAGES.MODULE && <ModulePage mod={selectedModule} setPage={setPage} />}
      {page === PAGES.QUIZ && <QuizListPage setPage={setPage} />}
      {page === PAGES.QUIZ_PLAY && <QuizPlayPage setPage={setPage} />}
      {page === PAGES.TRENDS && <TrendsPage />}
      {page === PAGES.METHODOLOGY && <InstitutionalPage title="Méthodologie" icon="📐" sections={methodSections} setPage={setPage} />}
      {page === PAGES.LIMITS && <InstitutionalPage title="Limites" icon="⚠️" sections={limitSections} setPage={setPage} />}
      {page === PAGES.ABOUT && <InstitutionalPage title="Qui sommes-nous" icon="👥" sections={aboutSections} setPage={setPage} />}
      {/* Footer */}
      <footer style={{ borderTop: "1px solid #1e2d3d", padding: "24px", textAlign: "center", marginTop: 40 }}>
        <div style={{ fontSize: 12, color: "#475569" }}>
          Citizen Analyzer — Plateforme citoyenne d'analyse politique · Open Source · Non-partisan
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
